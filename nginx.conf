server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # EIA API reverse proxy — injects API key server-side, caches 6h
    location /api/eia/ {
        include /etc/nginx/eia_key.conf;
        resolver 127.0.0.11 valid=30s;
        rewrite ^/api/eia/(.*) /$1?api_key=$eia_api_key&$args? break;
        proxy_pass https://api.eia.gov;
        proxy_ssl_server_name on;
        proxy_set_header Host api.eia.gov;
        proxy_set_header Accept-Encoding "";
        proxy_cache eia_cache;
        proxy_cache_valid 200 6h;
        proxy_cache_use_stale error timeout updating;
        proxy_ignore_headers Cache-Control Expires;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # E-Control Spritpreisrechner API proxy (Austria, no key required)
    location /api/econtrol/ {
        resolver 127.0.0.11 valid=30s;
        rewrite ^/api/econtrol/(.*) /sprit/1.0/$1 break;
        proxy_pass https://api.e-control.at;
        proxy_ssl_server_name on;
        proxy_set_header Host api.e-control.at;
        proxy_set_header Accept-Encoding "";
        proxy_cache eia_cache;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating;
        proxy_ignore_headers Cache-Control Expires;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
